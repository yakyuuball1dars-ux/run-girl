<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Copiaの伝説 — 学習モード（第1章 株式投資の基本知識①）</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    min-height:100%; background:radial-gradient(circle at 50% 20%, #2a2a4e, #14142a);
    color:#fff; font-family:"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;
    padding:16px; display:flex; flex-direction:column; align-items:center;
  }
  h1 { font-size:clamp(18px,5vw,26px); color:#ffd166; text-align:center; margin-bottom:4px;
       text-shadow:0 2px 0 #b8860b; }
  .sub { color:#bdbde0; font-size:13px; margin-bottom:16px; text-align:center; }
  .tabs { display:flex; gap:8px; margin-bottom:16px; }
  .tab { padding:8px 18px; border-radius:999px; border:2px solid #ffd166;
         background:transparent; color:#ffd166; font-weight:700; cursor:pointer; font-size:15px; }
  .tab.active { background:#ffd166; color:#1a1a2e; }
  .panel { width:min(94vw,560px); }
  .hidden { display:none !important; }

  /* 単語帳 */
  .card { background:linear-gradient(160deg,#3a3a66,#262648); border:1px solid #4a4a7a;
          border-radius:16px; padding:28px 22px; min-height:230px; cursor:pointer;
          display:flex; flex-direction:column; align-items:center; justify-content:center;
          text-align:center; box-shadow:0 10px 30px rgba(0,0,0,.4); user-select:none; }
  .card .label { font-size:12px; color:#9a9ac0; margin-bottom:10px; letter-spacing:1px; }
  .card .term { font-size:clamp(22px,7vw,34px); font-weight:800; color:#ffd166; line-height:1.3; }
  .card .mean { font-size:clamp(15px,4.4vw,19px); color:#fff; line-height:1.6; }
  .card .hint { margin-top:16px; font-size:12px; color:#8a8ab0; }
  .nav { display:flex; align-items:center; justify-content:space-between; margin-top:14px; gap:10px; }
  .nav button { flex:1; padding:12px; border-radius:10px; border:none; background:#4a4a7a; color:#fff;
                font-weight:700; font-size:16px; cursor:pointer; }
  .nav .count { color:#bdbde0; font-size:14px; min-width:64px; text-align:center; }

  /* クイズ */
  .q { font-size:clamp(16px,4.6vw,21px); font-weight:800; line-height:1.5; margin-bottom:16px; }
  .choices { display:flex; flex-direction:column; gap:10px; }
  .choice { text-align:left; padding:13px 16px; border-radius:12px; border:2px solid #5a5a8a;
            background:rgba(255,255,255,.05); color:#fff; font-size:clamp(14px,4vw,17px);
            font-weight:600; cursor:pointer; line-height:1.4; }
  .choice:hover { border-color:#ffd166; }
  .choice.correct { background:rgba(34,197,94,.25); border-color:#22c55e; }
  .choice.wrong { background:rgba(239,68,68,.25); border-color:#ef4444; }
  .choice:disabled { cursor:default; }
  .explain { margin-top:14px; padding:12px 14px; border-radius:10px; background:rgba(255,209,102,.12);
             border-left:4px solid #ffd166; font-size:14px; line-height:1.6; color:#ffe9a8; min-height:1em; }
  .qhead { display:flex; justify-content:space-between; color:#bdbde0; font-size:13px; margin-bottom:8px; }
  .next-btn { margin-top:16px; width:100%; padding:13px; border-radius:10px; border:none;
              background:#ffd166; color:#1a1a2e; font-weight:800; font-size:16px; cursor:pointer; }
  .result { text-align:center; }
  .result .big { font-size:clamp(28px,9vw,48px); font-weight:900; color:#ffd166; margin:8px 0; }
  .result .msg { font-size:16px; color:#fff; margin-bottom:18px; }
  .review { text-align:left; margin-top:10px; }
  .review h3 { font-size:15px; color:#ff9de0; margin-bottom:8px; }
  .review-item { background:rgba(0,0,0,.25); border-radius:10px; padding:10px 12px; margin-bottom:8px; font-size:13px; line-height:1.5; }
  .review-item .ok { color:#86efac; }

  .gamelink { display:inline-block; margin-top:24px; padding:12px 22px; border-radius:12px;
              background:linear-gradient(135deg,#2d6cdf,#7b3ff2); color:#fff; font-weight:800;
              text-decoration:none; font-size:16px; box-shadow:0 6px 20px rgba(123,63,242,.4); }
  .footer-note { margin-top:18px; font-size:11px; color:#7a7aa0; text-align:center; max-width:560px; line-height:1.6; }
</style>
</head>
<body>
  <h1>📖 Copiaの伝説 — 学習モード</h1>
  <div class="sub">第1章 株式投資の基本知識①（用語＆クイズ）</div>

  <div class="tabs">
    <button class="tab active" id="tabCard" onclick="showTab('card')">🃏 単語帳</button>
    <button class="tab" id="tabQuiz" onclick="showTab('quiz')">📝 クイズ</button>
  </div>

  <!-- 単語帳 -->
  <div class="panel" id="cardPanel">
    <div class="card" id="card" onclick="flipCard()">
      <div class="label" id="cardLabel">用語（タップで意味）</div>
      <div class="term" id="cardFront"></div>
      <div class="mean hidden" id="cardBack"></div>
      <div class="hint" id="cardHint">タップして答えを見る</div>
    </div>
    <div class="nav">
      <button onclick="prevCard()">◀ 前</button>
      <div class="count" id="cardCount"></div>
      <button onclick="nextCard()">次 ▶</button>
    </div>
    <div class="nav">
      <button onclick="shuffleCards()" style="background:#5a3a8a">🔀 シャッフル</button>
    </div>
  </div>

  <!-- クイズ -->
  <div class="panel hidden" id="quizPanel">
    <div id="quizBody">
      <div class="qhead"><span id="qProgress"></span><span id="qScore"></span></div>
      <div class="q" id="qText"></div>
      <div class="choices" id="qChoices"></div>
      <div class="explain hidden" id="qExplain"></div>
      <button class="next-btn hidden" id="qNext" onclick="nextQuiz()">次の問題 ▶</button>
    </div>
    <div class="result hidden" id="quizResult"></div>
  </div>

  <a class="gamelink" href="index.html">🎮 ゲームで復習する →</a>
  <div class="footer-note">
    ※本アプリの問題は教材の知識をもとに作成したオリジナルです。情報は学習目的の一般的内容であり、
    投資勧誘ではありません。実際の制度・税制は変わることがあるため最新情報をご確認ください。
  </div>

<script>
// ===== コンテンツ（第1章の知識をもとにしたオリジナル）=====
const TERMS = [
  ['株式', '会社が資金調達のため発行する、会社の所有権を表す証券。'],
  ['株主', '株式を持つ人。会社のオーナーで、配当や議決権などの権利を持つ。'],
  ['配当金', '会社が稼いだ利益の一部を株主に分配するお金。'],
  ['内部留保', '利益のうち社内に蓄える分。将来の設備投資や事業拡大の原資。'],
  ['売却益（譲渡益）', '買った価格より高く売れたときに得られる差額の利益。'],
  ['株主優待', '会社が株主に自社製品や金券などを提供する特典。'],
  ['利回り（年利）', '投資した元本に対する1年間のリターンの割合（％）。'],
  ['複利', '得た利息を元本に加えて再投資し、雪だるま式に増やす仕組み。'],
  ['単元株', '売買の基本単位。上場株は原則100株単位。'],
  ['単元未満株', '100株未満で買える株。1株や金額指定で少額から購入可能。'],
  ['時価総額', '株価 × 発行株数。会社全体のおよその値段（規模）。'],
  ['証券総合取引口座', '証券会社で最初に開く口座。株式・債券・投信などを扱える。'],
  ['特定口座（源泉徴収あり）', '証券会社が税金の計算・納税を代行。確定申告が不要で簡便。'],
  ['源泉徴収', '払うべき税金を、証券会社があらかじめ天引きすること。'],
  ['税率20.315%', '株式の利益にかかる税。所得税等15.315%＋住民税5%。'],
  ['NISA', '一定額までの投資の利益（売却益・配当）が非課税になる制度。'],
  ['つみたて投資枠', '年120万円。金融庁指定の一定の投資信託の積立用。'],
  ['成長投資枠', '年240万円。株式・ETF・投資信託などに投資できる。'],
  ['非課税保有限度額', 'NISAの総枠1,800万円（うち成長投資枠は1,200万円まで）。'],
  ['株式数比例配分方式', '配当を証券口座で受け取る方式。NISAで配当を非課税にする条件。']
];

const QUIZ = [
  ['株式会社が株式を発行する主な目的は？', ['事業に必要な資金を調達するため','税金を減らすため','社員の給料を払うため'], 0, '会社は工場・研究開発・人材採用などの資金を投資家から集めるために株式を発行します。'],
  ['株式を買った株主の立場は？', ['会社のオーナーの一人','会社の従業員','会社にお金を貸しただけの人'], 0, '株主は会社の所有者（オーナー）。利益還元や経営参加の権利を持ちます。'],
  ['会社の利益のうち、株主に直接支払われるものは？', ['配当金','売上高','内部留保'], 0, '利益の一部は配当金として株主へ。残りは内部留保として社内に蓄えます。'],
  ['株式投資のリターン3種に「含まれない」ものは？', ['預金利息','売却益','株主優待'], 0, 'リターンは①売却益②配当金③株主優待。預金利息は株式のリターンではありません。'],
  ['株式の売買の本質は？', ['投資家同士の転売','会社が毎日新株を発行','会社と直接の取引'], 0, '発行済み株式を投資家同士で売買しているだけで、会社は売買に関与しません。'],
  ['上場株式の売買単位は原則何株？', ['100株','1株','1,000株'], 0, '原則100株（単元）。ただし単元未満株サービスなら1株や金額指定でも買えます。'],
  ['利回り（年利）の計算式は？', ['年間リターン ÷ 元本 ×100','元本 ÷ リターン','リターン ÷ 株価'], 0, '利回り(%) = 1年間のリターン金額 ÷ 当初の元本 ×100。'],
  ['10万円で買い、1年後に12万円で売った時の利回りは？', ['20%','12%','2%'], 0, 'リターン2万円 ÷ 元本10万円 ×100 = 20%。リターンは差額の2万円です。'],
  ['リターンを「％（利回り）」で表す理由は？', ['金額の大小によらず収益性を比較できる','税金が安くなる','計算しなくてよくなる'], 0, '％なら投資額が違っても、どちらが効率よく儲かったか公平に比較できます。'],
  ['単利と複利の違いは？', ['複利は利息を元本に加えて再投資する','複利は税金がかからない','単利のほうが増えやすい'], 0, '複利は得た利息を元本に組み入れて再投資するため、年々増え方が加速します。'],
  ['効率よく資産形成するコツは？', ['稼いだ収益を再投資する','利益をすぐ使い切る','1銘柄に全額投資する'], 0, '配当金や売却益を再投資して複利効果を活かすのがコツです。'],
  ['証券会社で最初に開く口座は？', ['証券総合取引口座','FX口座','信用取引口座'], 0, 'まず証券総合取引口座を開設。株式・債券・投資信託などを扱えます。'],
  ['確定申告の手間を省きたい人に向く口座は？', ['特定口座（源泉徴収あり）','一般口座','源泉徴収なしの特定口座'], 0, '源泉徴収ありの特定口座なら、証券会社が税計算から納税まで代行します。'],
  ['株式の利益にかかる税率は合計で約何％？', ['約20.315%','約10%','約30%'], 0, '所得税・復興特別所得税15.315% ＋ 住民税5% ＝ 20.315%。配当・売却益とも同じ。'],
  ['ネット証券が店舗証券より手数料が安い傾向の理由は？', ['店舗維持などの経費が少ない','取引量が少ない','国の補助があるから'], 0, '支店運営コストが低いぶん、取引手数料を安く抑えやすい傾向があります。'],
  ['NISA口座の最大の特徴は？', ['利益が非課税になる','手数料が必ず無料','元本が保証される'], 0, 'NISA口座内の売却益や配当金などは非課税。確定申告も不要です。'],
  ['新NISA（2024年〜）の年間投資枠は？', ['つみたて120万・成長240万','どちらも100万','合計で100万'], 0, 'つみたて投資枠120万円/年、成長投資枠240万円/年。併用で最大360万円/年。'],
  ['新NISAの非課税保有限度額（総枠）は？', ['1,800万円','800万円','600万円'], 0, '総枠1,800万円（うち成長投資枠は1,200万円まで）。簿価残高方式で管理します。'],
  ['新NISAの非課税保有期間は？', ['無期限','5年','20年'], 0, '新NISAでは非課税で保有できる期間が無期限になりました。'],
  ['NISA口座は同時にいくつの金融機関で開ける？', ['1つだけ','3つまで','無制限'], 0, 'NISA口座は1金融機関のみ。ただし年単位で金融機関の変更は可能です。'],
  ['NISAで配当金を非課税で受け取るために必要な方式は？', ['株式数比例配分方式','配当金領収証方式','登録配当金受領口座方式'], 0, '配当を証券口座で受け取る「株式数比例配分方式」を指定する必要があります。'],
  ['NISAで株式を売却すると、非課税枠はどうなる？', ['簿価（取得額）分が翌年以降に復活','一切復活しない','即日2倍になる'], 0, '簿価残高方式なので、売却した取得額ぶんの枠が翌年以降に再利用できます。']
];

// ===== 単語帳 =====
let cards = TERMS.map((t,i)=>i);
let ci = 0, flipped = false;
function renderCard() {
  const t = TERMS[cards[ci]];
  document.getElementById('cardFront').textContent = t[0];
  document.getElementById('cardBack').textContent = t[1];
  document.getElementById('cardCount').textContent = (ci+1)+' / '+cards.length;
  flipped = false;
  document.getElementById('cardFront').classList.remove('hidden');
  document.getElementById('cardBack').classList.add('hidden');
  document.getElementById('cardLabel').textContent = '用語（タップで意味）';
  document.getElementById('cardHint').textContent = 'タップして答えを見る';
}
function flipCard() {
  flipped = !flipped;
  document.getElementById('cardFront').classList.toggle('hidden', flipped);
  document.getElementById('cardBack').classList.toggle('hidden', !flipped);
  document.getElementById('cardLabel').textContent = flipped ? '意味' : '用語（タップで意味）';
  document.getElementById('cardHint').textContent = flipped ? 'タップで用語に戻る' : 'タップして答えを見る';
}
function nextCard() { ci = (ci+1) % cards.length; renderCard(); }
function prevCard() { ci = (ci-1+cards.length) % cards.length; renderCard(); }
function shuffleCards() {
  for (let i=cards.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [cards[i],cards[j]]=[cards[j],cards[i]]; }
  ci = 0; renderCard();
}

// ===== クイズ =====
let order = [], qi = 0, correct = 0, wrongList = [], answered = false;
function startQuiz() {
  order = QUIZ.map((q,i)=>i);
  for (let i=order.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [order[i],order[j]]=[order[j],order[i]]; }
  qi = 0; correct = 0; wrongList = [];
  document.getElementById('quizResult').classList.add('hidden');
  document.getElementById('quizBody').classList.remove('hidden');
  renderQuiz();
}
function renderQuiz() {
  answered = false;
  const q = QUIZ[order[qi]];
  document.getElementById('qProgress').textContent = '問題 '+(qi+1)+' / '+order.length;
  document.getElementById('qScore').textContent = '正解 '+correct;
  document.getElementById('qText').textContent = '📈 '+q[0];
  const box = document.getElementById('qChoices');
  box.innerHTML = '';
  q[1].forEach((txt,idx)=>{
    const b = document.createElement('button');
    b.className = 'choice';
    b.textContent = ['①','②','③'][idx]+' '+txt;
    b.onclick = ()=>answerQuiz(idx);
    box.appendChild(b);
  });
  const ex = document.getElementById('qExplain');
  ex.classList.add('hidden'); ex.textContent = '';
  document.getElementById('qNext').classList.add('hidden');
}
function answerQuiz(idx) {
  if (answered) return;
  answered = true;
  const q = QUIZ[order[qi]];
  const btns = document.getElementById('qChoices').children;
  for (let i=0;i<btns.length;i++){ btns[i].disabled = true; if (i===q[2]) btns[i].classList.add('correct'); }
  if (idx === q[2]) { correct++; }
  else { btns[idx].classList.add('wrong'); wrongList.push(order[qi]); }
  const ex = document.getElementById('qExplain');
  ex.textContent = (idx===q[2]?'⭕ 正解！ ':'❌ 不正解… ') + q[3];
  ex.classList.remove('hidden');
  document.getElementById('qScore').textContent = '正解 '+correct;
  document.getElementById('qNext').textContent = (qi < order.length-1) ? '次の問題 ▶' : '結果を見る 🏁';
  document.getElementById('qNext').classList.remove('hidden');
}
function nextQuiz() {
  if (qi < order.length-1) { qi++; renderQuiz(); }
  else { showResult(); }
}
function showResult() {
  document.getElementById('quizBody').classList.add('hidden');
  const r = document.getElementById('quizResult');
  const pct = Math.round(correct/order.length*100);
  let msg = pct===100 ? '全問正解！完璧です🎉' : pct>=80 ? 'すばらしい！あと少し💪' : pct>=50 ? 'いい調子。復習で伸ばそう📚' : 'まずは間違いを復習しよう📖';
  let html = '<div class="big">'+correct+' / '+order.length+'</div>'
           + '<div class="msg">正答率 '+pct+'%　'+msg+'</div>';
  if (wrongList.length) {
    html += '<div class="review"><h3>📌 間違えた問題の復習</h3>';
    wrongList.forEach(i=>{
      const q = QUIZ[i];
      html += '<div class="review-item">'+q[0]+'<br><span class="ok">✔ '+q[1][q[2]]+'</span><br>'+q[3]+'</div>';
    });
    html += '</div>';
  }
  html += '<button class="next-btn" onclick="startQuiz()">🔄 もう一度（シャッフル）</button>';
  r.innerHTML = html;
  r.classList.remove('hidden');
}

// init
renderCard();
function showTab(which) {
  const card = which==='card';
  document.getElementById('cardPanel').classList.toggle('hidden', !card);
  document.getElementById('quizPanel').classList.toggle('hidden', card);
  document.getElementById('tabCard').classList.toggle('active', card);
  document.getElementById('tabQuiz').classList.toggle('active', !card);
  if (!card && !order.length) startQuiz();
}
</script>
</body>
</html>
